name: Build Signed Release APK

# Только ручной запуск (требует секретов)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-signed:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Декодирование keystore из секрета GitHub
    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > italiano_keystore.jks

    # Сборка подписанного Release APK
    - name: Build Signed Release APK
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    # Загрузка артефакта
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed-${{ github.event.inputs.version }}
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 90

    # Создание GitHub Release
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Release v${{ github.event.inputs.version }}
        files: app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
